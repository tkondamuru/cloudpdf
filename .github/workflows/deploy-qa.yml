name: Deploy to QA Environment (OIDC Federated)

on:
  pull_request:
    branches:
      - qa
    types:
      - closed

jobs:
  deploy:
    # Only execute if the pull request was successfully merged (not just closed)
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    # Required permissions for requesting the OIDC JWT token
    permissions:
      id-token: write
      contents: read

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Get Short Git Commit SHA and Timestamp
        id: vars
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "timestamp=$(TZ=America/New_York date +'%m%d%H%M%S')" >> $GITHUB_OUTPUT

      - name: Log in to Azure via OIDC
        uses: azure/login@v2
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_SUBSCRIPTION_ID }}

      - name: Build and Push Image via ACR Tasks
        run: |
          az acr build \
            --registry sat0049pdfregistry \
            --image cloudpdf-processor:${{ steps.vars.outputs.sha_short }} .

      - name: Update Azure Container App
        run: |
          az containerapp update \
            --name cloudpdf-service \
            --resource-group pdf-processor-rg \
            --image sat0049pdfregistry.azurecr.io/cloudpdf-processor:${{ steps.vars.outputs.sha_short }} \
            --revision-suffix t${{ steps.vars.outputs.timestamp }}
